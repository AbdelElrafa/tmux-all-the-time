name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail

          project="tmux-all-the-time"
          asset="${project}_${GOOS}_${GOARCH}.tar.gz"
          staging="$(mktemp -d)"

          go build -trimpath -ldflags="-s -w" -o "${staging}/${project}" .
          tar -C "${staging}" -czf "${asset}" "${project}"

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: tmux-all-the-time_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz

  publish:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          short_sha="${GITHUB_SHA::7}"
          tag="main-${GITHUB_RUN_NUMBER}-${short_sha}"

          gh release create "$tag" \
            dist/*/*.tar.gz \
            --repo "${GITHUB_REPOSITORY}" \
            --title "main ${short_sha}" \
            --notes "Automated release for ${GITHUB_SHA}"
